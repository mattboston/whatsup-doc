# schema: https://json.schemastore.org/github-action
# yamllint disable rule:line-length
# yamllint disable rule:truthy
---
name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            tag=$(git describe --tags --match "v[0-9]*" --abbrev=0 2>/dev/null || echo "dev")
            count=$(git rev-list ${tag}..HEAD --count 2>/dev/null || echo "0")
            echo "value=${tag}-${count}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/whatsup-doc:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository_owner }}/whatsup-doc:latest
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
